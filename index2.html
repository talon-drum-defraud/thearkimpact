<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ark Impact - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #333;
            overflow-x: hidden;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, #4a7c59 0%, #2d5a3e 50%, #1a3c28 100%);
            color: white;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1.5" fill="rgba(255,255,255,0.05)"/><circle cx="50" cy="10" r="0.8" fill="rgba(255,255,255,0.08)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>') repeat;
            opacity: 0.5;
        }

        .hero > * {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: normal;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .tagline {
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-style: italic;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        .contact {
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .email-link {
            color: #e8f5e8;
            text-decoration: none;
            font-weight: bold;
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .email-link:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .hero {
                padding: 1rem;
            }

            h1 {
                margin-bottom: 0.5rem;
            }

            .tagline {
                margin-bottom: 1.5rem;
            }
        }

        /* Simple animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero {
            animation: fadeInUp 1.2s ease-out;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>The Ark Impact</h1>
        <p class="tagline">Walking alongside organisations shaping change, strengthening the work that matters.</p>
        <div class="contact">
            <a href="mailto:hello@thearkimpact.com" class="email-link">Get in touch: hello@thearkimpact.com</a>
        </div>
        <p style="font-size: 0.9rem; opacity: 0.8;">Strategic planning and advisory in conservation fields. Coming soon.</p>
    </section>
</body>
</html>
